name: Quality Pulse Keep-Alive

on:
  schedule:
    - cron: '*/10 * * * *' # Run every 10 minutes
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Heartbeat Pulse
        run: |
          curl -s https://groww-pulse.onrender.com/health || echo "Service might be sleeping, waking up..."
