services:
  - type: web
    name: groww-pulse-dashboard
    env: python
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt --no-cache-dir --prefer-binary --verbose"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: CACHE_EXPIRY_MINUTES
        value: 60
